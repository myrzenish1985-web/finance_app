name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool
        pip install buildozer cython

    - name: Build APK
      run: |
        buildozer init
        # Заменяем требования в .spec файле
        sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
        sed -i 's/^android.ndk = .*/android.ndk = 23b/' buildozer.spec
        sed -i 's/^android.api = .*/android.api = 30/' buildozer.spec
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-finance-app
        path: bin/*.apk
